name: Deploy on Main Push

on:
  push:
    branches:
      - main
    paths:
      - "services/aris-web/**"
      - "services/aris-backend/**"
      - "deploy/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-on-main.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aris-production-deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run_web: ${{ steps.resolve.outputs.run_web }}
      run_backend: ${{ steps.resolve.outputs.run_backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deploy targets
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_web=true" >> "$GITHUB_OUTPUT"
            echo "run_backend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "$ZERO_SHA" ]]; then
            BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)"
          fi

          if [[ -n "$BASE_SHA" ]]; then
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          else
            CHANGED_FILES="$(git ls-files)"
          fi

          run_web=false
          run_backend=false
          shared_changed=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              services/aris-web/*)
                run_web=true
                ;;
              services/aris-backend/*)
                run_backend=true
                ;;
              deploy/*|docker-compose.yml|.github/workflows/deploy-on-main.yml)
                shared_changed=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [[ "$shared_changed" == "true" ]]; then
            run_web=true
            run_backend=true
          fi

          echo "run_web=$run_web" >> "$GITHUB_OUTPUT"
          echo "run_backend=$run_backend" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: self-hosted
    needs: detect-changes
    if: needs.detect-changes.outputs.run_web == 'true' || needs.detect-changes.outputs.run_backend == 'true'
    env:
      DEPLOY_REPO_DIR: /home/ubuntu/project/web-agentic-coding
    steps:
      - name: Setup Node.js
        if: needs.detect-changes.outputs.run_backend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync deployment repository
        shell: bash
        run: |
          set -euo pipefail
          git -C "$DEPLOY_REPO_DIR" fetch origin main
          git -C "$DEPLOY_REPO_DIR" checkout main
          git -C "$DEPLOY_REPO_DIR" pull --ff-only origin main

      - name: Install backend dependencies
        if: needs.detect-changes.outputs.run_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix "$DEPLOY_REPO_DIR/services/aris-backend" ci

      - name: Deploy backend (PM2 zero-downtime)
        if: needs.detect-changes.outputs.run_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          "$DEPLOY_REPO_DIR/deploy/deploy_backend_zero_downtime.sh"

      - name: Deploy web (blue/green zero-downtime)
        if: needs.detect-changes.outputs.run_web == 'true'
        shell: bash
        run: |
          set -euo pipefail
          "$DEPLOY_REPO_DIR/deploy/deploy_web_zero_downtime.sh"
