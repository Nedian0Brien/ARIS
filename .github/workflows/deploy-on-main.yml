name: Deploy Manually

on:
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: 'Force deploy both web and backend regardless of file changes'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: aris-production-deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run_web: ${{ steps.resolve.outputs.run_web }}
      run_backend: ${{ steps.resolve.outputs.run_backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deploy targets
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ inputs.force_full_deploy }}" == "true" ]]; then
            echo "run_web=true" >> "$GITHUB_OUTPUT"
            echo "run_backend=true" >> "$GITHUB_OUTPUT"
            echo "::notice::force_full_deploy=true — deploying both web and backend"
            exit 0
          fi

          # Inspect files changed across recent commits. Using HEAD~10..HEAD gives
          # a generous window so that multi-commit pushes don't silently skip deploys.
          changed="$(git diff --name-only HEAD~10..HEAD 2>/dev/null || git diff --name-only HEAD^..HEAD)"

          run_web=false
          run_backend=false

          while IFS= read -r f; do
            case "$f" in
              # Web service sources
              services/aris-web/*|\
              docker-compose.yml|\
              # Web-specific deploy scripts and shared deploy libs
              deploy/deploy_web.sh|\
              deploy/deploy_zero_downtime.sh|\
              deploy/deploy_web_zero_downtime.sh|\
              deploy/internal/web_zero_downtime.sh|\
              deploy/lib/*|\
              deploy/dev/*)
                run_web=true ;;
            esac
            case "$f" in
              # Backend service sources
              services/aris-backend/*|\
              # Backend-specific deploy scripts
              deploy/deploy_backend_zero_downtime.sh|\
              deploy/deploy_zero_downtime.sh|\
              deploy/internal/backend_zero_downtime.sh|\
              deploy/ecosystem.config.cjs|\
              deploy/lib/*)
                run_backend=true ;;
            esac
          done <<< "$changed"

          # Safety fallback: if nothing matched, deploy both to avoid silent no-ops.
          if [[ "$run_web" == "false" && "$run_backend" == "false" ]]; then
            echo "::warning::No service-specific changes detected in last 10 commits; deploying both as safety fallback"
            run_web=true
            run_backend=true
          fi

          echo "run_web=$run_web" >> "$GITHUB_OUTPUT"
          echo "run_backend=$run_backend" >> "$GITHUB_OUTPUT"
          echo "::notice::deploy targets — web=${run_web} backend=${run_backend}"

  deploy:
    runs-on: self-hosted
    needs: detect-changes
    if: needs.detect-changes.outputs.run_web == 'true' || needs.detect-changes.outputs.run_backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: needs.detect-changes.outputs.run_backend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve deployment repository path
        id: resolve-deploy-repo
        env:
          HOST_PROJECTS_ROOT: /home/ubuntu/project/ARIS
        shell: bash
        run: |
          set -euo pipefail
          # Use fixed path for production deployment to avoid worktree confusion
          deploy_repo_dir="$HOST_PROJECTS_ROOT"

          if [[ ! -d "$deploy_repo_dir" ]]; then
            echo "::error::Fixed deploy repository path not found at ${deploy_repo_dir}"
            exit 1
          fi

          echo "Resolved deploy repo: $deploy_repo_dir"
          echo "deploy_repo_dir=$deploy_repo_dir" >> "$GITHUB_OUTPUT"

      - name: Sync deployment repository
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_REPO_DIR="${{ steps.resolve-deploy-repo.outputs.deploy_repo_dir }}"
          git -C "$DEPLOY_REPO_DIR" fetch origin main
          git -C "$DEPLOY_REPO_DIR" checkout main
          has_local_changes=0
          if ! git -C "$DEPLOY_REPO_DIR" diff --quiet || ! git -C "$DEPLOY_REPO_DIR" diff --cached --quiet; then
            has_local_changes=1
          fi
          if [[ -n "$(git -C "$DEPLOY_REPO_DIR" ls-files --others --exclude-standard)" ]]; then
            has_local_changes=1
          fi
          if [[ "$has_local_changes" -eq 1 ]]; then
            stash_name="gha-predeploy-$(date -u +%Y%m%dT%H%M%SZ)"
            git -C "$DEPLOY_REPO_DIR" stash push --include-untracked -m "$stash_name"
            echo "::warning::Local changes were stashed in ${DEPLOY_REPO_DIR} as ${stash_name} before pulling origin/main."
          fi
          git -C "$DEPLOY_REPO_DIR" pull --ff-only origin main

      - name: Install backend dependencies
        if: needs.detect-changes.outputs.run_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_REPO_DIR="${{ steps.resolve-deploy-repo.outputs.deploy_repo_dir }}"
          sudo rm -rf "$DEPLOY_REPO_DIR/services/aris-backend/node_modules/.vite"
          npm --prefix "$DEPLOY_REPO_DIR/services/aris-backend" ci

      - name: Deploy backend (PM2 zero-downtime)
        if: needs.detect-changes.outputs.run_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_REPO_DIR="${{ steps.resolve-deploy-repo.outputs.deploy_repo_dir }}"
          export DEPLOY_ENV_FILE="/home/ubuntu/.config/aris/prod.env"
          test -f "$DEPLOY_ENV_FILE"
          export ARIS_SHARED_REPO_ROOT="$DEPLOY_REPO_DIR"
          "$DEPLOY_REPO_DIR/deploy/deploy_backend_zero_downtime.sh"

      - name: Deploy web (blue/green zero-downtime)
        if: needs.detect-changes.outputs.run_web == 'true'
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_REPO_DIR="${{ steps.resolve-deploy-repo.outputs.deploy_repo_dir }}"
          export DEPLOY_ENV_FILE="/home/ubuntu/.config/aris/prod.env"
          test -f "$DEPLOY_ENV_FILE"
          "$DEPLOY_REPO_DIR/deploy/deploy_web.sh"
